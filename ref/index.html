<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selves — You've been invited</title>
  <link rel="icon" type="image/png" href="https://selves.id/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #000000;
      color: #FFFFFF;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    #scroll-progress {
      position: fixed;
      top: 0; left: 0;
      height: 1px;
      width: 0%;
      background: #FFFFFF;
      z-index: 1000;
      transition: width 0.1s linear;
    }

    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.65s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* Hero — same padding/rhythm as main page */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 0 60px;
    }

    .logo {
      font-size: 18px; font-weight: 700; letter-spacing: 2px;
      margin-bottom: 40px; color: #FFFFFF;
    }

    .section-label {
      font-size: 12px; font-weight: 700; letter-spacing: 2px;
      color: #666666; margin-bottom: 16px; text-transform: uppercase;
    }

    h1 {
      font-size: 48px; font-weight: 700; line-height: 1.1;
      margin-bottom: 16px; max-width: 700px;
    }

    .subtitle {
      font-size: 18px; color: #888888; margin-bottom: 32px;
      max-width: 560px; line-height: 1.5;
    }

    .position-card {
      padding: 16px 20px;
      background: #0A0A0A;
      border-left: 2px solid #333333;
      display: inline-block;
      min-width: 240px;
      margin-bottom: 32px;
      transition: border-color 0.4s ease;
    }

    .position-card.updated { border-left-color: #FFFFFF; }

    .position-card-label {
      font-size: 12px; font-weight: 700; color: #666666; margin-bottom: 6px;
      letter-spacing: 1px; text-transform: uppercase;
    }

    .position-value {
      font-size: 16px; font-weight: 600; color: #FFFFFF;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .position-value.updating { opacity: 0; transform: translateY(-4px); }

    .position-note {
      font-size: 13px; color: #666666; margin-top: 2px;
      transition: color 0.3s ease;
    }

    .position-note.flash { color: #CCCCCC; }

    .waitlist-form {
      max-width: 500px;
      margin-bottom: 0;
    }

    .waitlist-form input[type="email"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 16px;
      background: #0A0A0A;
      border: 1px solid #333333;
      color: #FFFFFF;
      margin-bottom: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .waitlist-form input[type="email"]:focus { border-color: #666666; }
    .waitlist-form input[type="email"]::placeholder { color: #444444; }

    .btn {
      padding: 16px 32px; font-size: 16px; font-weight: 600;
      border: none; cursor: pointer; font-family: inherit;
      display: inline-block; transition: all 0.2s; width: 100%;
    }

    .btn-primary { background: #FFFFFF; color: #000000; }
    .btn-primary:hover { background: #EEEEEE; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; background: #FFFFFF; color: #000000; }

    #waitlist-msg {
      margin-top: 16px; font-size: 14px; color: #888888; display: none;
    }

    .hero-note { font-size: 14px; color: #666666; margin-top: 16px; }

    .footer { padding: 40px 0; border-top: 1px solid #222222; text-align: center; }
    .footer-text { font-size: 14px; color: #666666; }

    /* skeleton */
    .skel {
      display: inline-block; height: 14px; width: 40px;
      background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      vertical-align: middle; border-radius: 1px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 768px) {
      h1 { font-size: 40px; }
      .subtitle { font-size: 18px; }
    }
  </style>
</head>
<body>

<div id="scroll-progress"></div>

<section class="hero">
  <div class="container">

    <div class="logo reveal">SELVES</div>

    <div class="section-label reveal" style="transition-delay:0.04s">Access granted by referral</div>

    <h1 class="reveal" style="transition-delay:0.08s">
      You're on someone's radar.
    </h1>

    <p class="subtitle reveal" style="transition-delay:0.16s">
      Access propagates through trust — one identity to another.
    </p>

    <div class="position-card reveal" id="position-card" style="transition-delay:0.24s">
      <div class="position-card-label">Referrer queue position</div>
      <div class="position-value" id="pos-value"><span class="skel"></span></div>
      <div class="position-note" id="pos-note">loading…</div>
    </div>

    <div class="waitlist-form reveal" style="transition-delay:0.32s">
      <input type="email" id="waitlist-email" placeholder="your@email.com" autocomplete="off">
      <button class="btn btn-primary" id="waitlist-btn" onclick="handleSignup()">Claim your position</button>
      <div id="waitlist-msg"></div>
    </div>

  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-text">© 2026 Selves and its related entities</div>
  </div>
</footer>

<script>
  const GET_POS_URL = 'https://getpositionbycode-szlgjkfwxq-uc.a.run.app';
  const SIGNUP_URL  = 'https://waitlistemail-szlgjkfwxq-uc.a.run.app';

  const code = new URLSearchParams(location.search).get('code') || '';
  let currentPosition = null;

  function ordinal(n) {
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  async function fetchPosition() {
    if (!code) {
      document.getElementById('pos-value').textContent = '—';
      document.getElementById('pos-note').textContent = 'invalid invite link';
      return;
    }
    try {
      const res = await fetch(`${GET_POS_URL}?code=${encodeURIComponent(code)}`);
      if (!res.ok) throw new Error();
      const { position } = await res.json();
      setPosition(position);
    } catch {
      document.getElementById('pos-value').textContent = '—';
      document.getElementById('pos-note').textContent = 'could not load position';
    }
  }

  function setPosition(newPos) {
    const valEl  = document.getElementById('pos-value');
    const noteEl = document.getElementById('pos-note');
    const card   = document.getElementById('position-card');

    if (currentPosition !== null && currentPosition !== newPos) {
      valEl.classList.add('updating');
      setTimeout(() => {
        valEl.textContent = ordinal(newPos);
        valEl.classList.remove('updating');
        noteEl.textContent = 'advanced from ' + ordinal(currentPosition);
        noteEl.classList.add('flash');
        card.classList.add('updated');
        setTimeout(() => {
          noteEl.textContent = 'queue position';
          noteEl.classList.remove('flash');
          card.classList.remove('updated');
        }, 3000);
      }, 200);
    } else {
      valEl.textContent = ordinal(newPos);
      noteEl.textContent = 'queue position';
    }
    currentPosition = newPos;
  }

  async function handleSignup() {
    const email = document.getElementById('waitlist-email').value.trim().toLowerCase();
    const btn   = document.getElementById('waitlist-btn');
    const msg   = document.getElementById('waitlist-msg');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      msg.style.display = 'block';
      msg.style.color = '#888888';
      msg.textContent = 'Enter a valid email address.';
      return;
    }

    btn.textContent = 'Submitting...';
    btn.disabled = true;
    msg.style.display = 'none';

    try {
      const res = await fetch(SIGNUP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, ref: code })
      });
      const text = await res.text();

      btn.style.display = 'none';
      msg.style.display = 'block';

      if (text === 'duplicate') {
        msg.style.color = '#888888';
        msg.textContent = "Already on the list.";
      } else {
        msg.style.color = '#FFFFFF';
        msg.textContent = "You're in the queue. We'll reach out when access opens.";
        setTimeout(() => fetchPosition(), 1500);
      }
    } catch {
      btn.disabled = false;
      btn.textContent = 'Request Access';
      msg.style.display = 'block';
      msg.style.color = '#888888';
      msg.textContent = 'Something went wrong. Try again.';
    }
  }

  document.getElementById('waitlist-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSignup();
  });

  window.addEventListener('scroll', () => {
    const h = document.documentElement.scrollHeight - window.innerHeight;
    if (h > 0) document.getElementById('scroll-progress').style.width = (window.scrollY / h * 100) + '%';
  }, { passive: true });

  // trigger reveals
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  // hero items reveal immediately
  document.querySelectorAll('.hero .reveal').forEach(el => el.classList.add('visible'));

  fetchPosition();
</script>

</body>
</html>
